<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Compras</title>
    <!-- Include necessary libraries for charts and Google Sheets integration -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <h1>Painel de Compras</h1>
    <div id="filters">
        <label for="dateFilter">Date:</label>
        <input type="date" id="dateFilter">
        <button onclick="loadData()">Apply Filter</button>
    </div>
    <canvas id="myChart" width="400" height="200"></canvas>
    <script>
        function loadData() {
            const date = document.getElementById('dateFilter').value;
            // Load data from Google Sheets using fetch API
            fetch('https://sheets.googleapis.com/v4/spreadsheets/YOUR_SHEET_ID/values/YOUR_RANGE?key=YOUR_API_KEY')
                .then(response => response.json())
                .then(data => {
                    // Process data and update chart
                    updateChart(data);
                })
                .catch(error => console.error('Error loading data:', error));
        }
        function updateChart(data) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.values[0], // Assuming first row is labels
                    datasets: [{
                        label: 'Dataset',
                        data: data.values[1], // Assuming second row is data
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
